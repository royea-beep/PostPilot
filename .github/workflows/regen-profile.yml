# =============================================================================
# Regenerate iOS Provisioning Profile for PostPilot
# =============================================================================
#
# Run this whenever the distribution certificate is renewed and the provisioning
# profile no longer matches. This workflow:
#   1. Installs fastlane on a macOS runner
#   2. Uses the ASC API key to create a fresh App Store profile for il.co.ftable.postpilot
#   3. Updates the PROVISIONING_PROFILE_BASE64 + IOS_PROVISIONING_PROFILE_BASE64 GitHub secrets
#   4. Saves the profile as a workflow artifact (7-day retention)
#
# Trigger: workflow_dispatch only (manual)
#
# Required Secrets:
#   ASC_API_KEY_ID       — App Store Connect API Key ID (set by agent)
#   ASC_API_KEY_ISSUER_ID — ASC API Issuer ID
#   ASC_API_KEY_P8       — Raw .p8 key content
#   DISTRIBUTION_P12_BASE64   — Current distribution cert (to verify cert match)
#   DISTRIBUTION_P12_PASSWORD — p12 password
#   GH_PAT               — GitHub Personal Access Token with repo+secrets scope
#                          (GITHUB_TOKEN cannot write secrets)
# =============================================================================

name: Regenerate iOS Provisioning Profile

on:
  workflow_dispatch:

jobs:
  regen-profile:
    name: Regenerate Profile via fastlane
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install fastlane
        run: gem install fastlane --no-document

      - name: Write ASC API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.ASC_API_KEY_P8 }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8
          echo "Key written: AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8"

      - name: Install distribution cert (to match profile to cert)
        env:
          CERT_BASE64: ${{ secrets.DISTRIBUTION_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DISTRIBUTION_P12_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/profile-regen.keychain-db
          KP=$(openssl rand -hex 12)

          echo -n "$CERT_BASE64" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KP" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PW=$KP" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          # Show cert fingerprint for diagnostics
          openssl pkcs12 -in "$CERT_PATH" -passin "pass:$CERT_PASSWORD" -nokeys -clcerts 2>/dev/null \
            | openssl x509 -noout -subject -fingerprint -enddate 2>/dev/null || true

      - name: Create App Store provisioning profile via fastlane sigh
        env:
          ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
        run: |
          PP_PATH="$RUNNER_TEMP/postpilot_appstore.mobileprovision"
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          # Build the api_key JSON file that fastlane expects
          API_KEY_JSON_PATH="$RUNNER_TEMP/asc_api_key.json"
          KEY_B64=$(base64 -i "$KEY_PATH" | tr -d '\n')
          cat > "$API_KEY_JSON_PATH" << KEYJSON
          {
            "key_id": "$ASC_KEY_ID",
            "issuer_id": "$ASC_ISSUER_ID",
            "key": "$KEY_B64",
            "is_key_content_base64": true,
            "in_house": false
          }
          KEYJSON

          fastlane sigh \
            --api_key_path "$API_KEY_JSON_PATH" \
            --app_identifier "il.co.ftable.postpilot" \
            --platform "ios" \
            --provisioning_name "PostPilot AppStore Distribution" \
            --output_path "$RUNNER_TEMP" \
            --filename "postpilot_appstore.mobileprovision" \
            --force \
            --skip_install

          if [ ! -f "$PP_PATH" ]; then
            echo "::error::Profile not created at $PP_PATH"
            ls -la "$RUNNER_TEMP"/*.mobileprovision 2>/dev/null || echo "No .mobileprovision files found"
            exit 1
          fi

          echo "Profile created: $PP_PATH ($(wc -c < "$PP_PATH") bytes)"

          # Extract UUID for logging
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID xml1 -o - - 2>/dev/null \
                 | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p' || echo "unknown")
          echo "Profile UUID: $UUID"
          echo "PROFILE_PATH=$PP_PATH" >> $GITHUB_ENV

      - name: Update GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PP_PATH="$RUNNER_TEMP/postpilot_appstore.mobileprovision"

          # Encode profile as base64 (no newlines)
          PROFILE_B64=$(base64 -i "$PP_PATH" | tr -d '\n')

          # Update both secret names (workflow checks both)
          echo "$PROFILE_B64" | gh secret set PROVISIONING_PROFILE_BASE64 \
            --repo royea-beep/PostPilot
          echo "OK: PROVISIONING_PROFILE_BASE64 updated"

          echo "$PROFILE_B64" | gh secret set IOS_PROVISIONING_PROFILE_BASE64 \
            --repo royea-beep/PostPilot
          echo "OK: IOS_PROVISIONING_PROFILE_BASE64 updated"

      - name: Save profile as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postpilot-provisioning-profile
          path: ${{ runner.temp }}/postpilot_appstore.mobileprovision
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain "${{ env.KEYCHAIN_PATH }}" 2>/dev/null || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8 2>/dev/null || true
