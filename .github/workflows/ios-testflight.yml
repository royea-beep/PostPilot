# =============================================================================
# iOS TestFlight — Build, archive, and upload to TestFlight
# =============================================================================
#
# Required GitHub Actions Secrets:
#
#   IOS_CERTIFICATE_BASE64        — Base64-encoded Apple Distribution certificate (.p12)
#   IOS_CERTIFICATE_PASSWORD      — Password used when exporting the .p12
#   IOS_PROVISIONING_PROFILE_BASE64 — Base64-encoded App Store provisioning profile (.mobileprovision)
#   APPLE_TEAM_ID                 — Apple Developer Team ID (default: 3K9KJNGL9U)
#   APPLE_ID                      — Apple ID email (e.g. royearguan@gmail.com)
#   APP_SPECIFIC_PASSWORD         — App-specific password from appleid.apple.com
#
# How to encode secrets (Mac):
#   base64 -i distribution.p12 | tr -d '\n' | pbcopy
#   base64 -i profile.mobileprovision | tr -d '\n' | pbcopy
#   base64 -i AuthKey_XXXXXXXX.p8 | tr -d '\n' | pbcopy
#
# How to encode secrets (Windows / Git Bash):
#   cat distribution.p12 | base64 -w 0 | clip
#   cat profile.mobileprovision | base64 -w 0 | clip
#   cat AuthKey_XXXXXXXX.p8 | base64 -w 0 | clip
#
# How to encode secrets (Windows / PowerShell):
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("distribution.p12")) | Set-Clipboard
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("profile.mobileprovision")) | Set-Clipboard
#   [Convert]::ToBase64String([IO.File]::ReadAllBytes("AuthKey_XXXXXXXX.p8")) | Set-Clipboard
#
# =============================================================================

name: iOS TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.DISTRIBUTION_P12_BASE64 }}" ] && MISSING="$MISSING DISTRIBUTION_P12_BASE64"
          [ -z "${{ secrets.DISTRIBUTION_P12_PASSWORD }}" ] && MISSING="$MISSING DISTRIBUTION_P12_PASSWORD"
          [ -z "${{ secrets.PROVISIONING_PROFILE_BASE64 }}${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" ] && MISSING="$MISSING PROVISIONING_PROFILE_BASE64"
          [ -z "${{ secrets.ASC_API_KEY_ID }}" ] && MISSING="$MISSING ASC_API_KEY_ID"
          [ -z "${{ secrets.ASC_API_KEY_ISSUER_ID }}" ] && MISSING="$MISSING ASC_API_KEY_ISSUER_ID"
          [ -z "${{ secrets.ASC_API_KEY_P8 }}" ] && MISSING="$MISSING ASC_API_KEY_P8"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing GitHub Actions secrets:$MISSING"
            echo "See MOBILE_SIGNING_CHECKLIST.md for how to obtain each value."
            exit 1
          fi
          echo "All required secrets are set."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create minimal web dir for Capacitor
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://postpilot.ftable.co.il"></head><body>Loading...</body></html>' > out/index.html

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import signing certificate
        env:
          DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_P12_BASE64 }}
          DISTRIBUTION_P12_PASSWORD: ${{ secrets.DISTRIBUTION_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/distribution.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KP="${KEYCHAIN_PASSWORD:-$(openssl rand -hex 12)}"

          echo -n "$DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KP" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KP" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$DISTRIBUTION_P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          echo "KEYCHAIN_PW=$KP" >> $GITHUB_ENV

      - name: Download provisioning profile
        id: profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 || secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/postpilot_distribution.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Extract UUID and install with UUID filename (required by Xcode)
          UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "Profile UUID: $UUID"
          echo "uuid=$UUID" >> $GITHUB_OUTPUT
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision

      - name: Bump build number (unique per run)
        working-directory: ios/App
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))
          echo "Setting build number to: $BUILD_NUMBER (run_number + 100)"
          # Update project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" App.xcodeproj/project.pbxproj
          sed -i '' "s/MARKETING_VERSION = [0-9.]*/MARKETING_VERSION = 2.3/g" App.xcodeproj/project.pbxproj
          grep "CURRENT_PROJECT_VERSION\|MARKETING_VERSION" App.xcodeproj/project.pbxproj
          # ALSO update Info.plist (xcodebuild reads this for the actual bundle version)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 2.3.0" App/Info.plist
          echo "Info.plist updated:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" App/Info.plist

      - name: Set provisioning profile UUID in Xcode project
        run: |
          # Inject UUID into the App target Release config (Manual signing set in pbxproj)
          sed -i '' "s/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE = \"$PROFILE_UUID\";/" \
            ios/App/App.xcodeproj/project.pbxproj
          # Patch Automatic → Manual for Release target if not already Manual
          sed -i '' "/504EC3181FED79650016851F \/\* Release \*\//,/};/{
            s/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tPROVISIONING_PROFILE = \"$PROFILE_UUID\";/
          }" ios/App/App.xcodeproj/project.pbxproj

      - name: Build & Archive
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PostPilot.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=3K9KJNGL9U

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/export-options.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>3K9KJNGL9U</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>il.co.ftable.postpilot</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          mkdir -p $RUNNER_TEMP/postpilot-ipa
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PostPilot.xcarchive \
            -exportPath $RUNNER_TEMP/postpilot-ipa \
            -exportOptionsPlist $RUNNER_TEMP/export-options.plist

          echo "Exported IPA:"
          ls -la $RUNNER_TEMP/postpilot-ipa/*.ipa

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          IPA_PATH=$(ls $RUNNER_TEMP/postpilot-ipa/*.ipa | head -1)
          echo "Uploading: $IPA_PATH"

          # Write ASC API key to expected location for xcrun altool
          mkdir -p ~/.appstoreconnect/private_keys
          echo "::add-mask::$ASC_API_KEY_P8"
          echo "$ASC_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_KEY_ISSUER_ID"

      - name: Save IPA as artifact (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postpilot-ipa
          path: ${{ runner.temp }}/postpilot-ipa/*.ipa
          retention-days: 7
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
